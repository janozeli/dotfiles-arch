# unit.schema.yaml — Referencia completa do formato unit.yaml
#
# Este arquivo documenta todas as capacidades disponiveis para uma unit.
# Use como template ao criar novas units.
#
# Stages obrigatorias: verify, setup
# Actions obrigatorias: teardown
# Stages extras: livres, rodam entre verify e setup na ordem declarada

# ──────────────────────────────────────────────
# Identificacao
# ──────────────────────────────────────────────

id: example                  # obrigatorio, unico entre todas as units
name: "Example unit"         # obrigatorio, exibido na UI
critical: false              # se true, falha aborta toda a execucao

# ──────────────────────────────────────────────
# Stages (pipeline de execucao)
# ──────────────────────────────────────────────
#
# O runner executa as stages na ordem declarada.
# Se a stage "verify" passa (exit 0), o runner pula o resto da unit.
# Cada stage pode ter multiplas tasks.

stages:
  # --- verify (obrigatoria) ---
  # Checa se a unit ja esta aplicada. Exit 0 = nada a fazer.
  - name: verify
    tasks:
      - task: verify.sh

  # --- stages extras (opcionais) ---
  # Rodam entre verify e setup. Uteis para pre-checks, downloads, etc.
  - name: pre_setup
    tasks:
      - task: check_deps.sh
        depends_on:
          - verify.sh          # dependencia local (task na mesma unit)
      - task: download.sh
        depends_on:
          - other_unit         # dependencia cross-unit (espera a unit "other_unit" completar)
    executor:
      shell: bash             # interpretador (default: bash)
      timeout: 60             # segundos, 0 = sem limite (default: 0)
      sudo: false             # prefixar com sudo (default: false)
      env:                    # variaveis de ambiente extras
        - STEP_CONTEXT
      retry:                  # politica de retry
        max_attempts: 2       # tentativas (default: 1)
        delay: 5              # segundos entre tentativas (default: 0)

  # --- setup (obrigatoria) ---
  # Aplica as mudancas. Assume que precisa rodar (verify ja decidiu isso).
  - name: setup
    tasks:
      - task: setup.sh
        depends_on:
          - other_unit         # so roda depois que other_unit completou
    executor:
      timeout: 300
      sudo: true

# ──────────────────────────────────────────────
# Actions (scripts opcionais, invocados sob demanda)
# ──────────────────────────────────────────────
#
# Nao entram no pipeline normal. Invocados via:
#   ./install.sh --action teardown:example
#
# teardown e obrigatorio. Outros sao livres.

actions:
  teardown:                          # obrigatorio
    task: teardown.sh
    description: "Reverte este unit"
  list:                              # opcional
    task: list.sh
    description: "Lista o que seria aplicado"
  status:                            # opcional
    task: status.sh
    description: "Mostra estado atual"

# ──────────────────────────────────────────────
# Flags (metadata livre)
# ──────────────────────────────────────────────
#
# O runner nao interpreta flags — sao metadata pra tooling externo,
# manifest, ou logica futura.

flags:
  needs_reboot: false
  category: "packages"

# ──────────────────────────────────────────────
# Estrutura de arquivos esperada
# ──────────────────────────────────────────────
#
# units/example/
#   unit.yaml              ← este arquivo
#   tasks/
#     verify.sh            ← obrigatorio (stage verify)
#     setup.sh             ← obrigatorio (stage setup)
#     teardown.sh          ← obrigatorio (action teardown)
#     check_deps.sh        ← opcional (stage extra)
#     download.sh          ← opcional (stage extra)
#     list.sh              ← opcional (action)
#     status.sh            ← opcional (action)
#   packages.list          ← arquivo auxiliar (lido pelas tasks)
#   .context/              ← criado pelo runner em runtime (.gitignore)
